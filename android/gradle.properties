org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation (fixes cross-drive path issues on Windows)
kotlin.incremental=false
# Override rive_common NDK version to match installed NDK
rive.ndk.version=27.0.12077973
# Suppress minSdk error for rive_common (minSdk 19 < NDK 27 requirement of 21)
android.ndk.suppressMinSdkVersionError=21
